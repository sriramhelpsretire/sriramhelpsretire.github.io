<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Benefits</title>
    <style>
        :root {
            --bg-dark: #0d1b1e;
            --bg-light: #1b4d5c;
            --accent-gold: #e7ca60;
            --text-yellow: #f4d03f;
            --red-accent: #a82222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #080f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .page-wrapper {
            width: 100%;
            max-width: 600px;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* ── HEADER ── */
        header {
            padding: 28px 30px 16px;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            font-family: 'Segoe UI', Georgia, serif;
        }

        .red-corner {
            position: absolute;
            top: 0; right: 0;
            width: 22px;
            height: 80px;
            background-color: var(--red-accent);
        }

        /* ── CONTENT ── */
        .content {
            padding: 8px 26px 20px;
            font-size: 16px;
            line-height: 2.0;
            flex: 1;
        }

        /* Each bullet point row */
        .point {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            align-items: flex-start;
        }

        .point-icon {
            font-size: 45px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .point-text {
            font-style: italic;
            color: #e0e0e0;
            font-size: 14.5px;
            line-height: 1.85;
        }

        /* Inline underlined links within text */
        .point-text a {
            color: #e0e0e0;
            text-decoration: underline;
        }

        .point-text a:hover {
            color: var(--accent-gold);
        }

        /* ── NAV AREA ── */
        .nav-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px 36px;
            gap: 8px;
        }

        .gold-btn {
            background-color: var(--accent-gold);
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #000;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: opacity .15s;
        }

        .gold-btn:hover { opacity: .88; }

        .home-btn {
            background-color: white;
            border: 2px solid black;
            padding: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            text-decoration: none;
        }

        .home-btn:hover { background: #f0f0f0; }

        /* ── FOOTER ── */
        footer {
            height: 20px;
            width: 100%;
            background-color: var(--red-accent);
            border-top: 2px solid #000;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .page-wrapper { border: none; }
            header h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <header>
        <div class="red-corner"></div>
        <h1>Employer Benefits</h1><br>
		<h1>- Health, 401k match, Life Insurance, PTO</h1
    </header>

    <div class="content">

        <div class="point">
            <span class="point-icon">🚧_____🔨</span><br>
            <br><span class="point-text">COMING SOON.</span>
        </div>

                     

        
    </div>

    <!-- Navigation -->
    <div class="nav-area">
        
        <a href="index.html" class="home-btn">
            <span style="font-size:28px;color:black;">🏠</span>
        </a>
    </div>

    <footer></footer>
</div>

</body>
</html>
