<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Calculator - Retire Wise</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .grid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #1abc9c;
            background: rgba(0, 0, 0, 0.5);
        }

        section-header {
            grid-column: span 2;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            padding-bottom: 5px;
            color: #1abc9c;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(26, 188, 156, 0.4);
            background: linear-gradient(135deg, #1ed7b1 0%, #1abc9c 100%);
        }
    </style>
</head>
<body>

    <h2>Projection Inputs</h2>

    <div class="form-container">
        <form action="proj_account_values.html">
            <div class="grid-section">
                <div class="section-header">Personal & Retirement Timing</div>
                <div class="input-group">
                    <label>Annual spending (today's $)</label>
                    <input type="number" placeholder="e.g. 100000">
                </div>
                <div class="input-group">
                    <label>Planned retirement age (Spouse 1)</label>
                    <input type="number" placeholder="e.g. 65">
                </div>
                <div class="input-group">
                    <label>Spouse 1 Current age</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Spouse 2 Current age</label>
                    <input type="number">
                </div>

                <div class="section-header">Social Security & RMD</div>
                <div class="input-group">
                    <label>Age of Spouse 1 for SS</label>
                    <input type="number" placeholder="e.g. 70">
                </div>
                <div class="input-group">
                    <label>Age of Spouse 2 for SS</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Annual SS for Spouse 1</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Annual SS for Spouse 2</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>RMD start age</label>
                    <input type="number" value="75">
                </div>

                <div class="section-header">Tax Strategy & Conversions</div>
                <div class="input-group">
                    <label>Roth conversion start year</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Roth conversion end year</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Roth conversion amount</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Standard Deduction Federal</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>State Itemized Deduction</label>
                    <input type="number">
                </div>

                <div class="section-header">Assets at Age 60</div>
                <div class="input-group">
                    <label>401(k) value at age 60</label>
                    <input type="number">
                </div>
                               <div class="input-group">
                    <label>Roth IRA value at age 60</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>Total of Brokerage accounts at age 60</label>
                    <input type="number">
                </div>
                <div class="input-group">
                    <label>HSA total at age 60</label>
                    <input type="number">
                </div>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn">Calculate Projections</button>
            </div>
        </form>
    </div>

</body>
</html>
