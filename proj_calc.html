<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Calculator - Retire Wise</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            color: #f1c40f;

            margin-bottom: 30px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;

            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
        }

        input:focus {
            outline: none;
            border-color: #1abc9c;
            background: rgba(0, 0, 0, 0.5);
        }

        .section-header {
            grid-column: span 2;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 20px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            color: #1abc9c;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

            text-align: center;
            margin-top: 40px;
        }
