<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Results</title>

<style>
  body {
    font-family: Arial;
    background: #0f2a52;
    color: white;
    text-align: center;
    padding: 40px;
  }

  .card {
    background: #1e3a5c;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
  }

  a {
    display: inline-block;
    margin-top: 20px;
    color: #7ec8e3;
  }
</style>
</head>

<body>

<h1>Retirement Results</h1>

<div class="card" id="results"></div>

<a href="page2.html">← Edit Inputs</a>

<script>
const data = JSON.parse(localStorage.getItem('retirementInputs'));

if (!data) {
  document.getElementById('results').innerHTML = "No data found.";
} else {
  const retireAge = data.cur + data.cy;

  document.getElementById('results').innerHTML = `
    <p><b>Current Age:</b> ${data.cur}</p>
    <p><b>Retirement Age:</b> ${retireAge}</p>
    <p><b>401(k):</b> $${data.b401.toLocaleString()}</p>
    <p><b>Roth IRA:</b> $${data.bRoth.toLocaleString()}</p>
    <p><b>Annual Spending:</b> $${data.spend.toLocaleString()}</p>
  `;
}
</script>

</body>
</html>
