<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdrawal Strategy - Retirement Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1e2530; --border:#30363d;
    --accent:#e8c84a; --green:#4ade80; --blue:#60a5fa; --danger:#fb7185; --text:#e6edf3; --muted:#7d8590; --label:#a8b3bf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  header { 
    background: linear-gradient(135deg, #0d1117, #1a2235); 
    border-bottom: 1px solid var(--border); 
    padding: 18px 32px; 
    display: flex; 
    align-items: baseline; 
    gap: 14px; 
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--accent); }
  header span { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }

  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 69px); }

  /* Sidebar Styling */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; overflow-y: auto; }
  .sxn h3 { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 10px; color: var(--label); margin-bottom: 4px; text-transform: uppercase; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'DM Mono', monospace; outline: none; }
  .field input:focus { border-color: var(--accent); }

  .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .action-btn { width: 100%; border-radius: 8px; padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; text-decoration: none; transition: 0.2s; border: none; font-family: 'DM Sans', sans-serif; }
  .calc-btn { background: var(--accent); color: #0d1117; }
  .home-btn { background: var(--surface2); color: var(--accent); border: 1px solid var(--accent); }
  .home-btn:hover { background: var(--accent); color: #0d1117; }

  /* Main Area */
  .main { padding: 32px; overflow-y: auto; }
  .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-top: 3px solid var(--blue); }
  .stat-card.warning { border-top-color: var(--danger); }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 28px; }

  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 30px; height: 300px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { border-collapse: collapse; width: 100%; font-family: 'DM Mono', monospace; font-size: 12px; }
  thead th { background: #181f2b; color: var(--accent); padding: 12px; text-align: right; border-bottom: 2px solid var(--border); }
  tbody td { padding: 10px 12px; text-align: right; color: var(--label); border-bottom: 1px solid var(--border); }
  td.hl { color: var(--text); font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>Withdrawal Strategy</h1>
  <span>// Sustainable Income Analysis</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sxn">
      <h3>Portfolio Settings</h3>
      <div class="field"><label>Portfolio at Start ($)</label><input type="number" id="portfolio" value="2000000"></div>
      <div class="field"><label>Annual Withdrawal ($)</label><input type="number" id="annualSpend" value="80000"></div>
      <div class="field"><label>Annual Inflation (%)</label><input type="number" id="inflation" value="3" step="0.1"></div>
      <div class="field"><label>Annual ROI (%)</label><input type="number" id="roi" value="6" step="0.1"></div>
      <div class="field"><label>Retirement Length (Yrs)</label><input type="number" id="duration" value="30"></div>
    </div>
    
    <div class="btn-group">
      <button class="action-btn calc-btn" onclick="calculateSustainability()">RUN SIMULATION</button>
      <a href="index.html" class="action-btn home-btn">HOME</a>
    </div>
  </aside>

  <main class="main">
    <div class="grid-stats">
      <div class="stat-card">
        <div class="stat-label">Initial Withdrawal Rate</div>
        <div class="stat-value" id="withdrawalRate">0%</div>
      </div>
      <div class="stat-card" id="statusCard">
        <div class="stat-label">Ending Balance</div>
        <div class="stat-value" id="endingBal">$0</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="sustainChart"></canvas>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left">Year</th>
            <th>Annual Withdrawal</th>
            <th>Market Growth</th>
            <th>Ending Balance</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
let chartInstance = null;

function calculateSustainability() {
    let balance = parseFloat(document.getElementById('portfolio').value);
    let spend = parseFloat(document.getElementById('annualSpend').value);
    let inflation = parseFloat(document.getElementById('inflation').value) / 100;
    let roi = parseFloat(document.getElementById('roi').value) / 100;
    let duration = parseInt(document.getElementById('duration').value);
    
    document.getElementById('withdrawalRate').innerText = ((spend / balance) * 100).toFixed(2) + '%';

    let dataLabels = [];
    let dataPoints = [];
    let html = "";
    let failed = false;

    for (let i = 1; i <= duration; i++) {
        let growth = balance * roi;
        balance = balance - spend + growth;
        
        if (balance < 0) balance = 0;

        dataLabels.push("Year " + i);
        dataPoints.push(balance.toFixed(0));

        html += `<tr>
            <td style="text-align:left; color:var(--accent)">Year ${i}</td>
            <td style="color:var(--danger)">$${Math.round(spend).toLocaleString()}</td>
            <td style="color:var(--green)">$${Math.round(growth).toLocaleString()}</td>
            <td class="hl">$${Math.round(balance).toLocaleString()}</td>
        </tr>`;

        spend *= (1 + inflation);
        if (balance <= 0 && !failed) failed = true;
    }

    document.getElementById('resultsBody').innerHTML = html;
    document.getElementById('endingBal').innerText = '$' + Math.round(balance).toLocaleString();
    
    const statusCard = document.getElementById('statusCard');
    statusCard.style.borderTopColor = balance > 0 ? 'var(--green)' : 'var(--danger)';

    updateChart(dataLabels, dataPoints);
}

function updateChart(labels, data) {
    const ctx = document.getElementById('sustainChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Portfolio Value',
                data: data,
                borderColor: '#e8c84a',
                backgroundColor: 'rgba(232, 200, 74, 0.1)',
                fill: true,
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { ticks: { color: '#7d8590', callback: v => '$' + v.toLocaleString() }, grid: { color: '#30363d' } },
                x: { ticks: { color: '#7d8590' }, grid: { color: '#30363d' } }
            }
        }
    });
}

calculateSustainability();
</script>
</body>
</html>
