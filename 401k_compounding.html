<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>401k Compounding Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:#f2f4f7; --surface:#ffffff; --surface2:#f8f9fa; --border:#000000;
    --accent:#8b6914; --green:#2e7d32; --blue:#1a6fa8; --text:#1a2a3a; --muted:#3d5166; --label:#3d5166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  header { 
    background: #1a2a3a;
    border-bottom: 4px solid #a82222; 
    padding: 18px 32px; 
    display: flex; 
    align-items: baseline; 
    gap: 14px;
    justify-content: space-between;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: #e8c84a; }
  header span { color: #c8c4b4; font-size: 14px; font-family: 'DM Mono', monospace; }
  header select {
    background: #333333;
    color: white;
    padding: 8px;
    border-radius: 6px;
    font-weight: bold;
    border: 1px solid #d4af37;
    cursor: pointer;
  }

  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 69px); }
  .sidebar { background: #1a2a3a; border-right: 2px solid #000; padding: 24px 20px; overflow-y: auto; }
  .sxn h3 { font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #e8c84a; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid rgba(201,147,58,0.4); }
  
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 14px; color: #e0e0e0; margin-bottom: 4px; text-transform: uppercase; }
  .field input { width: 80%; background: #0f2233; border: 1px solid rgba(201,147,58,0.5); color: #e8b96a; border-radius: 6px; padding: 8px 10px; font-family: 'DM Mono', monospace; outline: none; }
  .field input:focus { border-color: #c9933a; }

  .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  
  .action-btn { 
    width: 100%; 
    border-radius: 8px; 
    padding: 12px; 
    font-weight: 700; 
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer; 
    text-align: center;
    text-decoration: none;
    transition: 0.2s; 
    border: none;
  }

  .calc-btn { background: #FFEA00; color: #000000; }
  .calc-btn:hover { background: #693909; color: #fff; opacity: 1; transform: translateY(-1px); }

  .home-btn { 
    background: #FFEA00; 
    color: #000000; 
    border: 1px solid var(--accent); 
  }
  .home-btn:hover { background: #693909; color: #fff; }

  .main { padding: 32px; overflow-y: auto; }
  .summary-card { background: #ffffff; border: 1.5px solid #000; border-radius: 12px; padding: 24px; margin-bottom: 32px; border-top: 4px solid #2e7d32; display: inline-block; min-width: 300px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .summary-card .label { font-family: 'DM Mono', monospace; font-size: 14px; color: #8b6914; margin-bottom: 8px; }
  .summary-card .value { font-family: 'DM Serif Display', serif; font-size: 36px; color: #1a2a3a; }

  .chart-container { background: #ffffff; border: 1.5px solid #000; border-radius: 12px; padding: 22px; margin-bottom: 32px; height: 350px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .table-wrap { background: #ffffff; border: 1.5px solid #000; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  table { border-collapse: collapse; width: 100%; font-family: 'DM Mono', monospace; font-size: 12px; }
  thead th { background: #1a2a3a; color: #e8c84a; padding: 12px; text-align: right; border-bottom: 2px solid #000; font-size: 11px; }
  tbody td { padding: 10px 12px; text-align: right; color: #3d5166; border-bottom: 1px solid rgba(0,0,0,0.08); }
  tbody tr:hover { background: rgba(139,105,20,0.08); }
  td.hl { color: #1a2a3a; font-weight: 500; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <h1>401k COMPOUNDING GROWTH</h1>
    <span>-- Start saving early and stay consistent --</span>
  </div>
  <select onchange="if(this.value) window.location.href=this.value;">
    <option value="">Explore Topics</option>
    <optgroup label="Core Planning">
      <option value="transition_plan.html">📌 Retirement Made Easy</option>
      <option value="steps_retirement.html">📌 Steps in Retirement</option>
      <option value="terms.html">📌 Terms Used</option>
      <option value="website.html">📌 Web Sites</option>
    </optgroup>
    <optgroup label="Calculators">
      <option value="retirement_calculator.html">📌 Retirement Calculator</option>
      <option value="montecarlo_retirement.html">📌 Retirement Confidence</option>
      <option value="401k_compounding.html">📌 401k Compounding</option>
      <option value="tax_calculator.html">📌 Income Tax Calculator</option>
    </optgroup>
    <optgroup label="Healthcare">
      <option value="medicare_aca.html">📌 Medicare Hub</option>
      <option value="healthcare_medicare.html">📌 Healthcare - Medicare</option>
      <option value="healthcare_aca.html">📌 Healthcare - ACA</option>
      <option value="aca_vs_cobra.html">📌 ACA vs COBRA</option>
      <option value="medicare_flowchart.html">📌 Medicare Flowchart</option>
      <option value="long_term_care.html">📌 Long Term Care</option>
    </optgroup>
  </select>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sxn">
      <h3>Input current values</h3>
      <div class="field"><label>Current Age</label><input type="number" id="startAge" value="25"></div>
      <div class="field"><label>Annual Contribution ($)</label><input type="number" id="annualCont" value="12000"></div>
      <div class="field"><label>Employer Match ($)</label><input type="number" id="employerMatch" value="0"></div>
      <div class="field"><label>Expected Growth (%)</label><input type="number" id="growthRate" value="6" step="0.0"></div>
      <div class="field"><label>Contribution Increase ($/yr)</label><input type="number" id="contInc" value="0"></div>
      <div class="field"><label>Retirement Age</label><input type="number" id="endAge" value="65"></div>
    </div>
    
    <div class="btn-group">
      <button class="action-btn calc-btn" onclick="calculateCompounding()">CALCULATE GROWTH</button>
      <a href="index.html" class="action-btn home-btn">HOME</a>
    </div>
  </aside>

  <main class="main">
    <div class="summary-card">
      <div class="label">Projected Balance at Age <span id="displayRetirementAge">65</span></div>
      <div class="value" id="finalBalance">$0</div>
    </div>

    <div class="chart-container">
      <canvas id="growthChart"></canvas>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="text-align:left">Age</th>
            <th>Yearly Contribution</th>
            <th>Employer Match</th>
            <th>Growth Interest</th>
            <th>End Balance</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
let chartInstance = null;

function calculateCompounding() {
    let age = parseInt(document.getElementById('startAge').value);
    let contribution = parseFloat(document.getElementById('annualCont').value);
    let match = parseFloat(document.getElementById('employerMatch').value);
    let growth = parseFloat(document.getElementById('growthRate').value) / 100;
    let increment = parseFloat(document.getElementById('contInc').value);
    let retirementAge = parseInt(document.getElementById('endAge').value);
    
    let balance = 0;
    let dataLabels = [];
    let dataPoints = [];
    let html = "";

    document.getElementById('displayRetirementAge').innerText = retirementAge;

    for (let i = age; i <= retirementAge; i++) {
        let startBal = balance;
        let totalAnnualCont = contribution + match;
        let growthAmt = (startBal + totalAnnualCont) * growth;
        balance = startBal + totalAnnualCont + growthAmt;

        dataLabels.push("Age " + i);
        dataPoints.push(balance.toFixed(0));

        html += `<tr>
            <td style="text-align:left; color:#8b6914; font-weight:bold;">${i}</td>
            <td>$${contribution.toLocaleString()}</td>
            <td>$${match.toLocaleString()}</td>
            <td style="color:#2e7d32">$${Math.round(growthAmt).toLocaleString()}</td>
            <td class="hl">$${Math.round(balance).toLocaleString()}</td>
        </tr>`;

        contribution += increment;
    }

    document.getElementById('resultsBody').innerHTML = html;
    document.getElementById('finalBalance').innerText = '$' + Math.round(balance).toLocaleString();
    updateChart(dataLabels, dataPoints);
}

function updateChart(labels, data) {
    const ctx = document.getElementById('growthChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '401k Balance',
                data: data,
                borderColor: '#e8c84a',
                backgroundColor: 'rgba(232, 200, 74, 0.1)',
                fill: true,
                tension: 0.3,
                borderWidth: 2
            }]
        },
        options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: {
        padding: {
            left: 10,
            right: 20,
            top: 10,
            bottom: 0
        }
    },
    plugins: { 
        legend: { display: false } 
    },
    scales: {
        x: { 
            grid: { color: 'rgba(0,0,0,0.08)' }, 
            ticks: { color: '#1a2a3a', font: { family: 'DM Mono' } } 
        },
        y: { 
            grid: { color: 'rgba(0,0,0,0.08)' }, 
            afterFit: (axis) => {
                axis.width = 80; 
            },
            ticks: { 
                color: '#1a2a3a', 
                font: { family: 'DM Mono' }, 
                callback: v => '$' + v.toLocaleString() 
            } 
        }
    }
}
    });
}

calculateCompounding();
</script>

</body>
</html>
