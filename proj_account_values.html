<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Projections - Retire Wise</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            color: #f1c40f; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .results-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .value-display {
            font-size: 3rem;
            color: #1abc9c;
            font-weight: bold;
            margin: 20px 0;
        }

        .calculation-detail {
            color: #bdc3c7;
            font-style: italic;
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #1abc9c;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #1abc9c;
            color: #0f2027;
        }
    </style>
</head>
<body>

    <header>
        <h1>Projection Results</h1>
    </header>

    <main class="results-card">
        <h3>Projected 401(k) Value at Age 75</h3>
        
        <div id="result" class="value-display">Calculating...</div>
        
        <p class="calculation-detail" id="detail">
            Based on a 15-year growth period from age 60 to 75.
        </p>

        <a href="proj_calc.html" class="btn-back">← Adjust Inputs</a>
    </main>

    <script>
        // Function to get data from the URL
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            // Note: These names must match the 'name' attribute if added to inputs, 
            // but for simple forms, we use the order or add names to the previous HTML.
            
            // For this to work perfectly, please ensure your inputs in proj_calc.html 
            // have 'name' attributes. Example: name="k401" and name="growth"
            const k401Value = parseFloat(params.get('k401')) || 0;
            const growthRate = parseFloat(params.get('growth')) || 0;

            calculate(k401Value, growthRate);
        }

        function calculate(principal, rate) {
            const years = 15; // From age 60 to 75
            const decimalRate = rate / 100;
            
            // Compound Interest Formula: A = P(1 + r)^t
            const futureValue = principal * Math.pow((1 + decimalRate), years);

            document.getElementById('result').innerText = 
                new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(futureValue);
            
            document.getElementById('detail').innerText = 
                `Grown from ${new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(principal)} at ${rate}% annual growth.`;
        }

        // Run on page load
        window.onload = getParams;
    </script>

</body>
</html>
