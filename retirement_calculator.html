<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Calculator - Pocket Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0d1b1e;
            --bg-light: #1b4d5c;
            --accent-gold: #e7ca60;
            --text-yellow: #f4d03f;
            --red-accent: #a82222;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #080f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .page-wrapper {
            width: 100%;
            max-width: 650px;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: white;
            padding-bottom: 40px;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        header { padding: 30px; position: relative; }
        header::after {
            content: ''; position: absolute; top: 0; right: 30px;
            width: 40px; height: 80px; background-color: var(--red-accent);
        }

        .container { padding: 0 30px; }
        
        /* Age Selector Styling */
        .input-section {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid var(--accent-gold);
        }

        .age-slider {
            width: 100%;
            margin: 20px 0;
            accent-color: var(--accent-gold);
        }

        .value-report {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .report-card {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .report-card span { color: var(--text-yellow); font-weight: bold; font-size: 1.2rem; }

        /* Chart Area */
        .chart-container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            height: 350px;
        }

        .nav-area {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
        }

        .home-btn {
            background: white; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1>Portfolio Projection</h1>
    </header>

    <div class="container">
        <div class="input-section">
            <label>Select Age to Inspect: <strong id="ageDisplay" style="color: var(--accent-gold);">65</strong></label>
            <input type="range" id="ageSlider" class="age-slider" min="60" max="90" value="65">
            
            <div class="value-report" id="itemizedList">
                <div class="report-card">401k<br><span id="val-401k">$0</span></div>
                <div class="report-card">Roth IRA<br><span id="val-roth">$0</span></div>
                <div class="report-card">Brokerage<br><span id="val-broker">$0</span></div>
                <div class="report-card">HSA<br><span id="val-hsa">$0</span></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="retirementChart"></canvas>
        </div>
    </div>

    <div class="nav-area">
        <a href="index.html" class="home-btn">🏠</a>
    </div>
</div>

<script>
    const ages = Array.from({length: 31}, (_, i) => 60 + i);
    
    // Placeholder logic for account growth (Replace with your specific math)
    const generateData = (start, rate) => ages.map((age, i) => Math.round(start * Math.pow(1 + rate, i)));

    const accountData = {
        '401k': generateData(500000, 0.04),
        'Roth IRA': generateData(150000, 0.06),
        'Brokerage': generateData(200000, 0.05),
        'HSA': generateData(30000, 0.03)
    };

    const ctx = document.getElementById('retirementChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ages,
            datasets: [
                { label: '401k', data: accountData['401k'], borderColor: '#3498db', tension: 0.3 },
                { label: 'Roth IRA', data: accountData['Roth IRA'], borderColor: '#f1c40f', tension: 0.3 },
                { label: 'Brokerage', data: accountData['Brokerage'], borderColor: '#2ecc71', tension: 0.3 },
                { label: 'HSA', data: accountData['HSA'], borderColor: '#e74c3c', tension: 0.3 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top' },
                tooltip: { enabled: true }
            },
            scales: {
                x: { title: { display: true, text: 'Age' } },
                y: { title: { display: true, text: 'Value ($)' } }
            }
        },
        plugins: [{
            id: 'verticalLine',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x;
                    let yAxis = chart.scales.y;
                    let ctx = chart.ctx;
                    ctx.save();
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(x, yAxis.top);
                    ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#a82222';
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }]
    });

    const slider = document.getElementById('ageSlider');
    const ageDisplay = document.getElementById('ageDisplay');

    function updateReporting(age) {
        const index = age - 60;
        document.getElementById('val-401k').innerText = '$' + accountData['401k'][index].toLocaleString();
        document.getElementById('val-roth').innerText = '$' + accountData['Roth IRA'][index].toLocaleString();
        document.getElementById('val-broker').innerText = '$' + accountData['Brokerage'][index].toLocaleString();
        document.getElementById('val-hsa').innerText = '$' + accountData['HSA'][index].toLocaleString();
        
        // Sync vertical line on chart
        const meta = chart.getDatasetMeta(0);
        const point = meta.data[index];
        chart.setActiveElements([{ datasetIndex: 0, index: index }]);
        chart.tooltip.setActiveElements([{ datasetIndex: 0, index: index }], { x: point.x, y: point.y });
        chart.update();
    }

    slider.oninput = function() {
        ageDisplay.innerText = this.value;
        updateReporting(parseInt(this.value));
    };

    // Initial Load
    updateReporting(65);
</script>

</body>
</html>
