<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Tax Scenarios - Responsive Midnight</title>
    <style>
        :root {
            --bg-page: #0a0a0a; 
            --bg-card: #181818; 
            --bg-input: #2a2a2a; 
            --neon-green: #39FF14; 
            --text-label: #cccccc; 
            --header-gold: #ffd700;
            --btn-gold: #e1c05a; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-page); 
            margin: 0; 
            padding: 10px; /* Reduced for mobile */
            color: var(--text-label);
        }

        h2 { 
            text-align: center; 
            color: #fff; 
            font-weight: 300; 
            margin: 20px 0;
            font-size: 1.5rem; /* Responsive sizing */
        }

        .dashboard { 
            display: flex; 
            flex-wrap: wrap; /* Allows stacking on mobile */
            gap: 20px; 
            justify-content: center;
            padding-bottom: 40px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .scenario-column { 
            background: var(--bg-card); 
            border: 1px solid #333; 
            width: 100%; /* Default to full width for mobile */
            max-width: 350px; /* Limits width on desktop */
            display: flex; 
            flex-direction: column; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .header { 
            background-color: var(--header-gold); 
            color: #000;
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 2px solid #000; 
            min-height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.85rem; 
            text-transform: uppercase;
        }
        
        .form-section { 
            background-color: #202020; 
            padding: 15px; 
            border-bottom: 1px solid #333; 
        }

        .input-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; /* Increased for easier tapping */
            align-items: center; 
        }

        .input-row label { 
            font-size: 0.85rem; 
            color: #999;
        }

        .input-row input { 
            width: 120px; 
            text-align: right; 
            padding: 10px; /* Larger touch target */
            border: 1px solid #444;
            border-radius: 6px;
            background-color: var(--bg-input); 
            color: var(--neon-green); 
            font-family: 'Consolas', monospace;
            font-weight: bold;
            font-size: 1.1rem; /* Slightly larger for readability */
            outline: none;
            -webkit-appearance: none; /* Removes mobile styling defaults */
        }

        .data-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 15px; 
            border-bottom: 1px solid #252525; 
            font-size: 0.85rem; 
        }

        .data-row span:last-child { 
            color: var(--neon-green);
            font-weight: bold;
            font-family: 'Consolas', monospace;
        }

        /* Color Coding */
        .yellow { background-color: rgba(255, 255, 0, 0.1); border-left: 4px solid #ffff00; }
        .cyan { background-color: rgba(0, 255, 255, 0.1); border-left: 4px solid #00ffff; }
        .green { background-color: rgba(146, 208, 80, 0.2); border-left: 4px solid #92d050; padding: 12px 15px !important; }
        .orange { background-color: rgba(255, 204, 153, 0.1); border-left: 4px solid #ffcc99; }
        
        .label-bold { font-weight: bold; color: #fff; }
        .spacer { height: 12px; }

        .footer-nav {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .btn-home {
            background-color: var(--btn-gold);
            color: #0c1219;
            text-decoration: none;
            padding: 15px 80px; /* Wider for mobile accessibility */
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        /* Desktop Adjustment */
        @media (min-width: 768px) {
            body { padding: 40px; }
            h2 { font-size: 2rem; margin-bottom: 40px; }
        }
    </style>
</head>
<body>

<h2>Retirement Planner - Tax Scenarios</h2>

<div class="dashboard">
    <div class="scenario-column" id="scen1">
        <div class="header">Roth Conversion + 401k withdrawal</div>
        <div class="form-section">
            <div class="input-row"><label>Roth Conv:</label><input type="number" class="roth" value="100000"></div>
            <div class="input-row"><label>401k Withdraw:</label><input type="number" class="w401k" value="20000"></div>
            <div class="input-row"><label>SS Income:</label><input type="number" class="ss" value="0"></div>
            <div class="input-row"><label>RMD:</label><input type="number" class="rmd" value="0"></div>
            <div class="input-row"><label>Other Income:</label><input type="number" class="other" value="0"></div>
            <div class="input-row"><label>LT Cap Gains:</label><input type="number" class="ltcg" value="0"></div>
        </div>
        <div class="results-section" id="res1"></div>
    </div>

    <div class="scenario-column" id="scen2">
        <div class="header">Roth Conversion + 1 Social Sec income</div>
        <div class="form-section">
            <div class="input-row"><label>Roth Conv:</label><input type="number" class="roth" value="100000"></div>
            <div class="input-row"><label>401k Withdraw:</label><input type="number" class="w401k" value="0"></div>
            <div class="input-row"><label>SS Income:</label><input type="number" class="ss" value="48000"></div>
            <div class="input-row"><label>RMD:</label><input type="number" class="rmd" value="0"></div>
            <div class="input-row"><label>Other Income:</label><input type="number" class="other" value="0"></div>
            <div class="input-row"><label>LT Cap Gains:</label><input type="number" class="ltcg" value="0"></div>
        </div>
        <div class="results-section" id="res2"></div>
    </div>

    <div class="scenario-column" id="scen3">
        <div class="header">Roth Conversion + 2 Social Sec incomes</div>
        <div class="form-section">
            <div class="input-row"><label>Roth Conv:</label><input type="number" class="roth" value="100000"></div>
            <div class="input-row"><label>401k Withdraw:</label><input type="number" class="w401k" value="0"></div>
            <div class="input-row"><label>SS Income:</label><input type="number" class="ss" value="75957"></div>
            <div class="input-row"><label>RMD:</label><input type="number" class="rmd" value="0"></div>
            <div class="input-row"><label>Other Income:</label><input type="number" class="other" value="0"></div>
            <div class="input-row"><label>LT Cap Gains:</label><input type="number" class="ltcg" value="0"></div>
        </div>
        <div class="results-section" id="res3"></div>
    </div>

    <div class="scenario-column" id="scen4">
        <div class="header">RMD + 2 Social Security incomes</div>
        <div class="form-section">
            <div class="input-row"><label>Roth Conv:</label><input type="number" class="roth" value="0"></div>
            <div class="input-row"><label>401k Withdraw:</label><input type="number" class="w401k" value="0"></div>
            <div class="input-row"><label>SS Income:</label><input type="number" class="ss" value="82218"></div>
            <div class="input-row"><label>RMD:</label><input type="number" class="rmd" value="50407"></div>
            <div class="input-row"><label>Other Income:</label><input type="number" class="other" value="0"></div>
            <div class="input-row"><label>LT Cap Gains:</label><input type="number" class="ltcg" value="0"></div>
        </div>
        <div class="results-section" id="res4"></div>
    </div>
</div>

<div class="footer-nav">
    <a href="index.html" class="btn-home">Home</a>
</div>

<script>
// Logic remains consistent with IRS/CA rules
const FED_BRACKETS = [
    { low: 0, high: 24800, rate: 0.10 },
    { low: 24800, high: 100800, rate: 0.12 },
    { low: 100800, high: 211400, rate: 0.22 },
    { low: 211400, high: 403550, rate: 0.24 },
    { low: 403550, high: 512450, rate: 0.32 },
    { low: 512450, high: 768700, rate: 0.35 },
    { low: 768700, high: Infinity, rate: 0.37 }
];

const CA_BRACKETS = [
    { low: 0, high: 22158, rate: 0.01 },
    { low: 22158, high: 52528, rate: 0.02 },
    { low: 52528, high: 82904, rate: 0.04 },
    { low: 82904, high: 115084, rate: 0.06 },
    { low: 115084, high: 145448, rate: 0.08 },
    { low: 145448, high: 742958, rate: 0.093 }
];

const STD_DED = 32200;
const CA_ITEMIZED = 28486;
const CA_EXEMPTION = 306;

function calcTax(taxable, brackets) {
    let tax = 0;
    let topRate = 0;
    for (let b of brackets) {
        if (taxable > b.low) {
            let chunk = Math.min(taxable, b.high) - b.low;
            tax += chunk * b.rate;
            topRate = b.rate * 100;
        }
    }
    return { tax, topRate };
}

function update() {
    for (let i = 1; i <= 4; i++) {
        const col = document.getElementById(`scen${i}`);
        const roth = parseFloat(col.querySelector('.roth').value) || 0;
        const w401k = parseFloat(col.querySelector('.w401k').value) || 0;
        const ss = parseFloat(col.querySelector('.ss').value) || 0;
        const rmd = parseFloat(col.querySelector('.rmd').value) || 0;
        const other = parseFloat(col.querySelector('.other').value) || 0;
        const ltcg = parseFloat(col.querySelector('.ltcg').value) || 0;

        const totalIncome = roth + w401k + ss + rmd + other + ltcg;
        const provInc = (totalIncome - ss) + (ss * 0.5);
        
        let taxableSS = 0;
        if (provInc > 44000) {
            taxableSS = Math.min(ss * 0.85, (provInc - 44000) * 0.85 + 6000);
        } else if (provInc > 32000) {
            taxableSS = Math.min(ss * 0.5, (provInc - 32000) * 0.5);
        }

        const fedAGI = (totalIncome - ss) + taxableSS;
        const fedTaxable = Math.max(0, fedAGI - STD_DED);
        const fedRes = calcTax(fedTaxable, FED_BRACKETS);

        const caAdjusted = totalIncome - ss;
        const caTaxable = Math.max(0, caAdjusted - CA_ITEMIZED);
        const caRes = calcTax(caTaxable, CA_BRACKETS);
        const caFinal = caRes.tax - CA_EXEMPTION;

        const totalTax = fedRes.tax + caFinal;
        const fmt = n => n.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});

        document.getElementById(`res${i}`).innerHTML = `
            <div class="spacer"></div>
            <div class="data-row label-bold"><span>Total Income</span><span>$${fmt(totalIncome)}</span></div>
            <div class="spacer"></div>
            <div class="data-row"><span>Provisional Income</span><span>$${fmt(provInc)}</span></div>
            <div class="data-row"><span>Taxable SS</span><span>$${fmt(taxableSS)}</span></div>
            <div class="data-row"><span>Federal AGI</span><span>$${fmt(fedAGI)}</span></div>
            <div class="data-row"><span>Fed Ord Income</span><span>$${fmt(fedTaxable)}</span></div>
            <div class="data-row yellow"><span>Federal Tax</span><span>$${fmt(fedRes.tax)}</span></div>
            <div class="data-row orange"><span>Fed Bracket</span><span>${fedRes.topRate}%</span></div>
            <div class="spacer"></div>
            <div class="data-row"><span>CA Taxable</span><span>$${fmt(caTaxable)}</span></div>
            <div class="data-row cyan"><span>CA Tax Net</span><span>$${fmt(caFinal)}</span></div>
            <div class="spacer"></div>
            <div class="data-row green"><span>Total Tax</span><span>$${fmt(totalTax)}</span></div>
        `;
    }
}

document.querySelectorAll('input').forEach(input => input.addEventListener('input', update));
update();
</script>

</body>
</html>
