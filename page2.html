<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inputs</title>

<style>
  body {
    font-family: Arial;
    background: #0f2a52;
    color: white;
    padding: 40px;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  input {
    width: 100%;
    padding: 8px;
    margin: 8px 0 16px;
  }

  button {
    padding: 12px 20px;
    background: #2b4b6f;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  a {
    display: inline-block;
    margin-top: 20px;
    color: #7ec8e3;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Enter Your Details</h2>

  <label>Current Age</label>
  <input type="number" id="currentAge" value="60">

  <label>Years Until Retirement</label>
  <input type="number" id="retireIn" value="5">

  <label>401(k) Balance</label>
  <input type="number" id="bal401" value="456000">

  <label>Roth IRA Balance</label>
  <input type="number" id="balRoth" value="400000">

  <label>Annual Spending</label>
  <input type="number" id="spending" value="60000">

  <button onclick="goToResults()">View Results →</button>

  <br>
  <a href="index.html">← Back to Home</a>
</div>

<script>
function goToResults() {

  const data = {
    cur: +document.getElementById('currentAge').value,
    cy: +document.getElementById('retireIn').value,
    b401: +document.getElementById('bal401').value,
    bRoth: +document.getElementById('balRoth').value,
    spend: +document.getElementById('spending').value
  };

  localStorage.setItem('retirementInputs', JSON.stringify(data));

  window.location.href = "results.html";
}
</script>

</body>
</html>
