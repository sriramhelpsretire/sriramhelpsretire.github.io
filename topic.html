<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Topics</title>
    <style>
        :root {
            --bg-dark: #0d1b1e;
            --bg-light: #1b4d5c;
            --accent-gold: #e7ca60;
            --play-blue: #60a5fa;
            --red-accent: #a82222;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Area */
        header {
            padding: 40px 30px 20px 40px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 400;
            margin: 0;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Vertical Button List */
        .topics-container {
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .topic-row {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            width: fit-content;
        }

        /* The Blue Play Icon */
        .play-icon {
            background-color: var(--play-blue);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        .play-icon::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 9px solid white;
            margin-left: 2px;
        }

        /* The Gold Buttons */
        .btn {
            background-color: var(--accent-gold);
            color: black;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 18px;
            border: 2px solid #000;
            min-width: 280px;
            text-align: left;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .topic-row:hover .btn {
            background-color: #f2d87e;
            transform: translateX(5px);
        }

        /* Home Button (Bottom Right) */
        .home-nav {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
        }

        .home-btn {
            background-color: white;
            border: 2px solid black;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .home-btn:hover {
            transform: scale(1.1);
        }

        .home-btn img {
            width: 35px;
            height: 35px;
        }

        /* Red Footer Bar */
        footer {
            height: 20px;
            width: 100%;
            background-color: var(--red-accent);
            border-top: 2px solid #000;
        }

        /* Multi-line button text adjustment */
        .btn-large {
            line-height: 1.1;
            padding: 8px 25px;
        }

    </style>
</head>
<body>

    <header>
        <h1>We have some very interesting<br>topics for you below</h1>
    </header>

    <div class="topics-container">
        <a href="retirement_plan.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">Retirement Plan</div>
        </a>

        <a href="financial_plan.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">Financial Plan</div>
        </a>

        <a href="medicare_aca.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">Medicare & ACA</div>
        </a>

        <a href="key_points.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">Some key points</div>
        </a>

        <a href="401k_compounding.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn btn-large">Power of compounding<br>through 401k growth</div>
        </a>

        <a href="worried_cash.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">Worrying about cash<br>running out?</div>
        </a>

        <a href="coming_soon.html" class="topic-row">
            <div class="play-icon"></div>
            <div class="btn">COMING SOON ...</div>
        </a>
    </div>

    <div class="home-nav">
        <a href="index.html" class="home-btn">
            <span style="font-size: 30px;">🏠</span>
        </a>
    </div>

    <footer></footer>

</body>
</html>
